<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>

<body>



<div class="nav flex">
        <img src="assets/image-removebg-preview.png" alt="" class="img">

    <div class="texto">
        <h3>• Planos de saude  </h3>
        <h3>• Agendamentos  </h3>
        <h3>• Profissionais  </h3>
    </div>
            
</div>

    <div class="caixa">
        <h2><b>Formulário de Adoção</b></h2>
        <form id="formAdocao">
            <label class="caixa" for="nome">Nome:</label>
            <input type="text" id="nome" placeholder="Digite seu nome">
            <br>
            <label class="caixa" for="email">Email:</label>
            <input type="text" id="email" placeholder="Digite seu email">
            <br>
            <label class="caixa" for="cpf">CPF</label>
            <input type="number" id="cpf" placeholder="Digite seu CPF">
            <br>
            <label class="caixa" for="moradia">Moradia: </label>
            <select name="moradia" id="moradia">
                <option value=""> Selecione</option>
                <option value="casa">Casa</option>
                <option value="apartamento">Apartamento</option>
            </select>
            <br>
            <label class="caixa" for="horas">Horas:</label>
            <input type="text" id="horas" placeholder="Quants horas o pet ficará sozinho">
            <br>
            <br>
            <label for="quintal">Possui Quintal?</label>
            <input type="radio" name="quintal" value="sim">Sim
            <input type="radio" name="quintal" value="nao">Não
            <br>
            <label for="pet">Já teve ped?</label>
            <input type="radio" name="pet" value="sim">Sim
            <input type="radio" name="pet" value="nao">Não
            <br>
            <button type="submit">Enviar</button>
        </form>
        <div id="resultado"></div>
    </div>

</body>

<script src="script/JavaScript.js"></script>

</html>
